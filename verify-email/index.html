<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050508" />
    <link rel="icon" href="/assets/favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <title>Turra — подтверждение почты</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=5" />
    <script src="/config.js"></script>
    <script src="/security.js"></script>
    <script src="/api.js"></script>
    <script src="/auth-common.js"></script>
  </head>
  <body class="sub-page">
    <div class="bg-glow" aria-hidden="true"></div>
    <main class="sub-main">
      <a class="sub-logo" href="/">
        <img src="/assets/logo.svg" alt="" width="40" height="40" />
        <span>Turra</span>
      </a>
      <div class="sub-card glass">
        <h1>Подтверждение почты</h1>
        <div class="spinner" id="spinner" style="margin: 20px auto 0"></div>
        <p class="sub-status" id="status">Подтверждаем ваш email…</p>
        <p id="success" class="alert alert--ok hidden"></p>
        <p id="error" class="alert hidden"></p>
        <a id="continue" class="btn btn--primary btn--wide hidden" href="/#buy">Выбрать тариф</a>
      </div>
    </main>
    <script>
      (async function () {
        const token = new URLSearchParams(location.search).get('token');
        const spinner = document.getElementById('spinner');
        const status = document.getElementById('status');
        const success = document.getElementById('success');
        const errorEl = document.getElementById('error');
        const cont = document.getElementById('continue');

        if (!token || !/^[a-f0-9]{64}$/i.test(token)) {
          spinner.classList.add('hidden');
          status.textContent = '';
          errorEl.textContent = 'Ссылка подтверждения недействительна или устарела.';
          errorEl.classList.remove('hidden');
          return;
        }

        try {
          const auth = await TurraApi.verifyEmail(token);
          TurraAuth.applyAuthResponse(auth);
          spinner.classList.add('hidden');
          status.textContent = '';
          success.textContent = 'Почта подтверждена! Теперь можно выбрать тариф и оплатить подписку.';
          success.classList.remove('hidden');
          cont.classList.remove('hidden');
        } catch (e) {
          spinner.classList.add('hidden');
          status.textContent = '';
          errorEl.textContent = TurraAuth.authErrorMessage(e);
          errorEl.classList.remove('hidden');
        }
      })();
    </script>
  </body>
</html>
