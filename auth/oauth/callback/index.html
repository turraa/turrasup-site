<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050508" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <title>Turra — вход</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=13" />
    <script src="/config.js"></script>
    <script src="/security.js"></script>
    <script src="/api.js?v=7"></script>
    <script src="/auth-common.js?v=2"></script>
  </head>
  <body class="sub-page">
    <div class="bg-glow" aria-hidden="true"></div>
    <main class="sub-main">
      <a class="sub-logo" href="/">
        <img src="/assets/logo.svg" alt="" width="40" height="40" />
        <span>Turra</span>
      </a>
      <div class="sub-card glass">
        <h1 id="title">Вход в аккаунт</h1>
        <div class="spinner" id="spinner" style="margin: 20px auto 0"></div>
        <p class="sub-status" id="status">Завершаем авторизацию…</p>
        <p id="error" class="alert hidden"></p>
        <a id="back" class="btn btn--primary btn--wide hidden" href="/profile/#accounts">В личный кабинет</a>
      </div>
    </main>
    <script>
      (async function () {
        const params = new URLSearchParams(location.search);
        const code = params.get('code');
        const state = params.get('state');
        const deviceId = params.get('device_id');
        const spinner = document.getElementById('spinner');
        const status = document.getElementById('status');
        const title = document.getElementById('title');
        const errorEl = document.getElementById('error');
        const back = document.getElementById('back');

        history.replaceState({}, '', '/auth/oauth/callback');

        if (!code || !state) {
          spinner.classList.add('hidden');
          status.textContent = '';
          errorEl.textContent = 'Вход отменён или ссылка устарела.';
          errorEl.classList.remove('hidden');
          back.classList.remove('hidden');
          return;
        }

        const saved = TurraAuth.loadOAuthState();
        if (!saved || saved.state !== state) {
          spinner.classList.add('hidden');
          status.textContent = '';
          errorEl.textContent = 'Сессия входа истекла. Попробуйте снова.';
          errorEl.classList.remove('hidden');
          back.classList.remove('hidden');
          return;
        }

        const isLink = saved.mode === 'link';
        if (isLink) title.textContent = 'Привязка аккаунта';

        async function finishLink() {
          status.textContent = 'Привязываем Яндекс…';
          let result;
          try {
            result = await TurraApi.linkProviderCallback(
              saved.provider,
              code,
              state,
              deviceId,
            );
          } catch (e) {
            TurraAuth.clearOAuthState();
            if (TurraAuth.redirectMergeIfNeeded(e)) return;
            throw e;
          }
          TurraAuth.clearOAuthState();

          if (TurraAuth.redirectMergeIfNeeded(result)) return;

          if (result.merge_required) {
            throw new Error(
              'Этот Яндекс уже привязан к другому аккаунту. Начните привязку заново из личного кабинета.',
            );
          }

          if (!result.success) {
            throw new Error(result.message || 'Не удалось привязать аккаунт');
          }

          location.replace('/profile/#accounts');
        }

        async function finishLogin() {
          let auth;
          try {
            auth = await TurraApi.oauthCallback(saved.provider, code, state, deviceId);
          } catch (e) {
            TurraAuth.clearOAuthState();
            if (TurraAuth.redirectMergeIfNeeded(e)) return;
            throw e;
          }
          TurraAuth.clearOAuthState();

          if (TurraAuth.redirectMergeIfNeeded(auth)) return;

          if (auth.access_token) TurraApi.storage.access = auth.access_token;
          if (auth.refresh_token) TurraApi.storage.refresh = auth.refresh_token;

          TurraAuth.applyAuthResponse(auth);
          sessionStorage.setItem('turravpn_scroll_pricing_once', '1');
          location.replace('/');
        }

        try {
          if (isLink) {
            await finishLink();
            return;
          }

          try {
            await finishLogin();
          } catch (e) {
            const msg = e?.message || '';
            if (
              /account linking/i.test(msg) &&
              typeof TurraApi.linkProviderCallback === 'function'
            ) {
              title.textContent = 'Привязка аккаунта';
              await finishLink();
              return;
            }
            throw e;
          }
        } catch (e) {
          spinner.classList.add('hidden');
          status.textContent = '';
          if (TurraAuth.redirectMergeIfNeeded(e)) return;
          errorEl.textContent = TurraAuth.authErrorMessage(e);
          errorEl.classList.remove('hidden');
          back.classList.remove('hidden');
          TurraAuth.clearOAuthState();
        }
      })();
    </script>
  </body>
</html>
