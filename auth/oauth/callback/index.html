<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050508" />
    <link rel="icon" href="/assets/favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <title>Turra — вход</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=5" />
    <script src="/config.js"></script>
    <script src="/security.js"></script>
    <script src="/api.js"></script>
    <script src="/auth-common.js"></script>
  </head>
  <body class="sub-page">
    <div class="bg-glow" aria-hidden="true"></div>
    <main class="sub-main">
      <a class="sub-logo" href="/">
        <img src="/assets/logo.svg" alt="" width="40" height="40" />
        <span>Turra</span>
      </a>
      <div class="sub-card glass">
        <h1>Вход в аккаунт</h1>
        <div class="spinner" id="spinner" style="margin: 20px auto 0"></div>
        <p class="sub-status" id="status">Завершаем авторизацию…</p>
        <p id="error" class="alert hidden"></p>
        <a id="back" class="btn btn--primary btn--wide hidden" href="/#buy">На главную</a>
      </div>
    </main>
    <script>
      (async function () {
        const params = new URLSearchParams(location.search);
        const code = params.get('code');
        const state = params.get('state');
        const deviceId = params.get('device_id');
        const spinner = document.getElementById('spinner');
        const status = document.getElementById('status');
        const errorEl = document.getElementById('error');
        const back = document.getElementById('back');

        history.replaceState({}, '', '/auth/oauth/callback');

        if (!code || !state) {
          spinner.classList.add('hidden');
          status.textContent = '';
          errorEl.textContent = 'Вход отменён или ссылка устарела.';
          errorEl.classList.remove('hidden');
          back.classList.remove('hidden');
          return;
        }

        const saved = TurraAuth.loadOAuthState();
        if (!saved || saved.state !== state) {
          spinner.classList.add('hidden');
          status.textContent = '';
          errorEl.textContent = 'Сессия входа истекла. Попробуйте снова с главной страницы.';
          errorEl.classList.remove('hidden');
          back.classList.remove('hidden');
          return;
        }

        try {
          const auth = await TurraApi.oauthCallback(saved.provider, code, state, deviceId);
          TurraAuth.clearOAuthState();
          TurraAuth.applyAuthResponse(auth);
          location.replace('/#buy');
        } catch (e) {
          spinner.classList.add('hidden');
          status.textContent = '';
          errorEl.textContent = TurraAuth.authErrorMessage(e);
          errorEl.classList.remove('hidden');
          back.classList.remove('hidden');
          TurraAuth.clearOAuthState();
        }
      })();
    </script>
  </body>
</html>
