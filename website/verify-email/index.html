<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Turra — подтверждение почты</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/config.js"></script>
    <script src="/api.js"></script>
    <script src="/auth-common.js"></script>
  </head>
  <body>
    <main class="container" style="padding: 80px 0; text-align: center">
      <div class="panel" style="max-width: 420px; margin: 0 auto">
        <div class="spinner" id="spinner" style="margin: 0 auto 16px"></div>
        <p id="status" style="color: var(--muted); margin: 0">Подтверждаем почту…</p>
        <p id="success" class="alert alert-success hidden" style="margin-top: 16px"></p>
        <p id="error" class="alert alert-error hidden" style="margin-top: 16px"></p>
        <a id="continue" class="btn btn-primary hidden" href="/#buy" style="margin-top: 16px">Продолжить</a>
      </div>
    </main>
    <script>
      (async function () {
        const token = new URLSearchParams(location.search).get('token');
        const spinner = document.getElementById('spinner');
        const status = document.getElementById('status');
        const success = document.getElementById('success');
        const errorEl = document.getElementById('error');
        const cont = document.getElementById('continue');

        if (!token) {
          spinner.classList.add('hidden');
          status.textContent = '';
          errorEl.textContent = 'Ссылка подтверждения недействительна.';
          errorEl.classList.remove('hidden');
          return;
        }

        try {
          const auth = await TurraApi.verifyEmail(token);
          TurraAuth.applyAuthResponse(auth);
          spinner.classList.add('hidden');
          status.textContent = '';
          success.textContent = 'Почта подтверждена! Можно выбрать тариф и оплатить подписку.';
          success.classList.remove('hidden');
          cont.classList.remove('hidden');
        } catch (e) {
          spinner.classList.add('hidden');
          status.textContent = '';
          errorEl.textContent = TurraAuth.authErrorMessage(e);
          errorEl.classList.remove('hidden');
        }
      })();
    </script>
  </body>
</html>
