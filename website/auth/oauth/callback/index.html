<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Turra — вход</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/config.js"></script>
    <script src="/api.js"></script>
    <script src="/auth-common.js"></script>
  </head>
  <body>
    <main class="container" style="padding: 80px 0; text-align: center">
      <div class="panel" style="max-width: 420px; margin: 0 auto">
        <div class="spinner" style="margin: 0 auto 16px"></div>
        <p id="status" style="color: var(--muted); margin: 0">Завершаем вход…</p>
        <p id="error" class="alert alert-error hidden" style="margin-top: 16px"></p>
        <a id="back" class="btn btn-primary hidden" href="/" style="margin-top: 16px">На главную</a>
      </div>
    </main>
    <script>
      (async function () {
        const params = new URLSearchParams(location.search);
        const code = params.get('code');
        const state = params.get('state');
        const deviceId = params.get('device_id');
        const status = document.getElementById('status');
        const errorEl = document.getElementById('error');
        const back = document.getElementById('back');

        history.replaceState({}, '', '/auth/oauth/callback');

        if (!code || !state) {
          status.textContent = '';
          errorEl.textContent = 'Вход отменён или ссылка устарела.';
          errorEl.classList.remove('hidden');
          back.classList.remove('hidden');
          return;
        }

        const saved = TurraAuth.loadOAuthState();
        if (!saved || saved.state !== state) {
          status.textContent = '';
          errorEl.textContent = 'Сессия входа истекла. Попробуйте снова с главной страницы.';
          errorEl.classList.remove('hidden');
          back.classList.remove('hidden');
          return;
        }

        try {
          const auth = await TurraApi.oauthCallback(saved.provider, code, state, deviceId);
          TurraAuth.clearOAuthState();
          TurraAuth.applyAuthResponse(auth);
          location.replace('/#buy');
        } catch (e) {
          status.textContent = '';
          errorEl.textContent = TurraAuth.authErrorMessage(e);
          errorEl.classList.remove('hidden');
          back.classList.remove('hidden');
          TurraAuth.clearOAuthState();
        }
      })();
    </script>
  </body>
</html>
